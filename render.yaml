# Render configuration for Full Stack Deployment
services:
  # Backend API Service
  - type: web
    name: django-backend
    runtime: python
    rootDir: .
    buildCommand: |
      cd backend
      pip install -r ../requirements.txt
      python manage.py migrate --noinput
      python manage.py collectstatic --noinput
    startCommand: |
      cd backend
      daphne -b 0.0.0.0 -p $PORT backend.asgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: backend.settings
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "django-backend.onrender.com,localhost,127.0.0.1"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://seekhowithrua-frontend.onrender.com,https://app.seekhowithrua.com"
    healthCheckPath: /api/auth/login/
    autoDeploy: true

  # Frontend Static Site
  - type: web
    name: seekhowithrua-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: 18
    autoDeploy: true
